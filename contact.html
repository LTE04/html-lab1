<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
</head>

<body>

<header>
    <h1>Contact Me</h1>
</header>

<nav>
    <a href="index.html">Home</a>
</nav>

<main>

<section>

<form action="#" method="post">

<fieldset>
<legend>Info</legend>

<label for="name">Name:</label>
<input type="text" id="name" name="name"
style="border:2px solid black; padding:5px;"
required maxlength="50"><br><br>

<label for="email">Email:</label>
<input type="email" id="email" name="email"
style="background-color:lightyellow;"
required><br><br>

<label for="age">Age:</label>
<input type="number" min="18" max="100"><br><br>

<label for="date">Date:</label>
<input type="date"><br><br>

<label for="range">Level:</label>
<input type="range" min="1" max="10"><br><br>

</fieldset>

<fieldset>
<legend>Choice</legend>

<select>
<optgroup label="General">
<option>Question</option>
</optgroup>
</select>

<input type="radio" name="c">Email
<input type="radio" name="c">Phone
<input type="radio" name="c">None

<br>

<input type="checkbox">Coding
<input type="checkbox">Design
<input type="checkbox">Gaming

</fieldset>

<textarea style="width:300px;height:100px;"></textarea><br>

<button style="background:blue;color:white;padding:10px;">
Submit
</button>

</form>

</section>

</main>

</body>
</html>
